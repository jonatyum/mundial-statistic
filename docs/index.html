<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mundial 2026 — Predicciones</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root{--bg:#0d1117;--surface:#161b27;--s2:#1e2433;--border:#2a3242;--text:#e6edf3;
        --muted:#8b949e;--home:#22c55e;--draw:#64748b;--away:#3b82f6;--gold:#eab308;--danger:#ef4444}
  *{box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font:14px/1.45 system-ui,-apple-system,sans-serif;margin:0}
  a{color:inherit}
  .strip{height:4px;background:linear-gradient(90deg,#006847 0 33%,#3c3b6e 33% 66%,#d80621 66% 100%)}
  header{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:14px 24px;
    background:var(--surface);border-bottom:1px solid var(--border)}
  .logo{font-size:18px;font-weight:800;letter-spacing:-.01em}
  .fresh{margin-left:auto;font-size:12px;color:var(--muted)}
  .fresh::before{content:"●";color:var(--home);margin-right:6px}
  .langtog{display:flex;gap:2px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--s2)}
  .langtog button{background:none;border:none;color:var(--muted);font:700 12px system-ui;
    padding:6px 11px;cursor:pointer}
  .langtog button.active{background:var(--away);color:#fff}
  .infobox{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:14px}
  .infobox h3{margin:0 0 4px;font-size:16px}
  .infobox .tag{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px}
  .infobox .formula{background:var(--s2);border:1px solid var(--border);border-radius:8px;
    padding:9px 12px;font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--gold);
    overflow-x:auto;margin:8px 0}
  .infobox ul{margin:8px 0 0;padding-left:18px;color:var(--muted)}
  .infobox ul li{margin:2px 0}
  .infobox p{margin:6px 0;color:var(--text)}
  .src{display:flex;flex-direction:column;gap:2px;padding:10px 0;border-bottom:1px solid var(--s2);min-width:0}
  .src:last-child{border:none}
  .src a{color:var(--away);font-weight:600;overflow-wrap:anywhere;word-break:break-word}
  .src .u{color:var(--muted);font-size:13px;overflow-wrap:anywhere;word-break:break-word}
  nav{display:flex;gap:4px;flex-wrap:wrap;padding:10px 24px;background:var(--surface);
    border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
  nav button{background:none;border:none;color:var(--muted);font:600 13px system-ui;
    padding:8px 14px;border-radius:8px;cursor:pointer}
  nav button.active{color:var(--text);background:var(--s2)}
  nav button:hover{color:var(--text)}
  main{max-width:1180px;margin:0 auto;padding:20px 24px 50px}
  .panel{display:none}.panel.active{display:block}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .filters select{background:var(--surface);color:var(--text);border:1px solid var(--border);
    border-radius:8px;padding:7px 10px;font:13px system-ui}
  .datehdr{font-size:14px;font-weight:700;margin:14px 0 10px;display:flex;align-items:center;gap:10px}
  .datehdr::after{content:"";flex:1;height:1px;background:var(--border)}
  .datehdr small{color:var(--muted);font-weight:400}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
  .mcard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 18px;
    font-variant-numeric:tabular-nums;box-shadow:0 2px 10px rgba(0,0,0,.25);transition:transform .12s,border-color .12s}
  .mcard:hover{transform:translateY(-2px);border-color:#3d4a61}
  .mlabel{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);
    display:flex;justify-content:space-between;gap:8px}
  .mteams{display:flex;align-items:center;justify-content:space-between;margin:8px 0 2px}
  .mteam{font-size:16px;font-weight:700}.mvs{color:var(--muted);font-size:11px}
  .mxg{text-align:center;color:var(--muted);font-size:11px;margin-bottom:8px}
  .mxg b{color:var(--text);font-size:14px}
  .result{font-size:26px;font-weight:800;text-align:center;margin:4px 0 6px;letter-spacing:.04em}
  .result small{font-size:12px;color:var(--muted);font-weight:400;display:block}
  .mbar{display:flex;height:24px;border-radius:7px;overflow:hidden;font-size:12px;font-weight:700}
  .mbar div{display:flex;align-items:center;justify-content:center;color:#0d1117;min-width:30px}
  .mlegend{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:5px;padding:0 2px}
  .mlegend b{font-weight:600}
  .chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
  .chip{font-size:12px;padding:2px 10px;border-radius:999px;background:var(--s2);border:1px solid var(--border)}
  .chip.hot{border-color:var(--gold);color:var(--gold)}
  .chip.ok{border-color:var(--home);color:var(--home)}
  .chip.bad{border-color:var(--danger);color:var(--danger)}
  .chip.live{border-color:var(--danger);color:var(--danger);font-weight:700;animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.55}}
  details.din{margin-top:12px;border-top:1px solid var(--s2);padding-top:8px}
  details.din summary{cursor:pointer;list-style:none;font-size:12px;font-weight:600;color:var(--away);
    display:flex;align-items:center;gap:6px;user-select:none}
  details.din summary::-webkit-details-marker{display:none}
  details.din summary::before{content:"▸";transition:transform .15s}
  details.din[open] summary::before{transform:rotate(90deg)}
  details.din summary:hover{color:var(--text)}
  .dbody{margin-top:12px}
  .dsec{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:6px 0 8px}
  .cmp{display:grid;grid-template-columns:52px 1fr 52px;gap:8px;align-items:center;margin-bottom:9px}
  .cmp .vl{text-align:right;font-weight:700;font-size:13px}.cmp .vr{text-align:left;font-weight:700;font-size:13px}
  .cmp .mid{text-align:center}.cmp .mid small{font-size:10px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:3px}
  .cmpbar{display:flex;height:8px;border-radius:4px;overflow:hidden;background:var(--s2)}
  .cmpbar i{display:block;height:100%}
  .mkt{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--s2);font-size:13px}
  .mkt:last-child{border:none}
  .slist{display:flex;flex-direction:column;gap:5px;margin-top:4px}
  .slrow{display:flex;align-items:center;gap:8px;font-size:13px}
  .slrow .sn{width:42px;font-weight:700}.slrow .sb{flex:1;height:7px;border-radius:4px;background:var(--s2);overflow:hidden}
  .slrow .sb i{display:block;height:100%;background:var(--gold)}.slrow .sp{width:40px;text-align:right;color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-align:right;
    padding:7px 8px;border-bottom:1px solid var(--border)}
  th:first-child{text-align:left}
  td{padding:8px;text-align:right;border-bottom:1px solid var(--s2);font-size:13px}
  td:first-child{text-align:left;font-weight:600}
  .pbar{position:relative;background:var(--s2);border-radius:5px;height:16px;min-width:90px;overflow:hidden}
  .pbar i{position:absolute;inset:0;background:linear-gradient(90deg,var(--home),#16a34a);border-radius:5px}
  .pbar b{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-style:normal}
  .tiles{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  .tile{flex:1;min-width:150px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
  .tile .l{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
  .tile .v{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:2px}
  .tile .v.ok{color:var(--home)}.tile .d{font-size:11px;color:var(--home)}
  .info{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--muted)}
  footer{color:var(--muted);font-size:11px;text-align:center;padding:18px;border-top:1px solid var(--border)}
  .seg{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
  .seg button{background:var(--surface);border:1px solid var(--border);color:var(--muted);
    padding:6px 14px;border-radius:8px;font:600 13px system-ui;cursor:pointer}
  .seg button.active{background:var(--s2);color:var(--text);border-color:#3d4a61}
  .chartbox{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
  @media(max-width:560px){.grid{grid-template-columns:1fr}}
</style>
</head>

ale de los datos.", "en": "The predictions combine two statistical models trained on the full history of international matches and projected over the whole tournament with a Monte Carlo simulation. No opinions or manual tweaks: everything comes from the data."}, "models": [{"name": "Elo-Davidson", "desc": {"es": "Calcula la fuerza (rating Elo) de cada selección desde todo el histórico (1872 en adelante). La extensión de Davidson reparte la probabilidad entre local, empate y visitante en lugar de solo ganar/perder.", "en": "Computes each team's strength (Elo rating) from the full history (1872 onward). The Davidson extension splits probability across home win, draw and away win instead of just win/lose."}, "formula": "P(local) = 1 / (1 + 10^((Eloᵥ − Eloₗ − ventaja_local) / 400))", "params": {"es": ["K por torneo: Mundial 60, continental 50, clasificatorio 40, amistoso 20", "Ventaja de local: +80 puntos Elo (no en sede neutral)", "ν (peso del empate): estimado por máxima verosimilitud sobre el histórico"], "en": ["K by competition: World Cup 60, continental 50, qualifier 40, friendly 20", "Home advantage: +80 Elo points (not on neutral ground)", "ν (draw weight): estimated by maximum likelihood over the history"]}}, {"name": "Dixon-Coles", "desc": {"es": "Modelo de Poisson bivariado para los goles de cada equipo. Estima fuerzas de ataque y defensa por selección, una ventaja de local (γ) y una corrección (ρ) para los marcadores bajos (0-0, 1-0, 0-1, 1-1) que un Poisson simple subestima.", "en": "Bivariate Poisson model for each team's goals. It estimates attack and defence strengths per team, a home advantage (γ) and a correction (ρ) for low scores (0-0, 1-0, 0-1, 1-1) that a plain Poisson underestimates."}, "formula": "λ_local = exp(μ + ataqueₗ − defensaᵥ + log γ);  λ_visit = exp(μ + ataqueᵥ − defensaₗ)", "params": {"es": ["Decaimiento temporal ξ = 0.0019 por día (los partidos viejos pesan menos)", "Ventana de entrenamiento: 8 años hacia atrás", "Matriz de marcadores os hasta que se juegan). Es el dataset de Kaggle \"International football results\", leído como CSV crudo desde su mirror en GitHub (sin API key) y cacheado en data/raw/. Con él se calculan el Elo y se ajusta el Dixon-Coles.", "en": "Main input: it doesn't predict, it feeds the model. Full history of international results (1872→today) and the real 2026 World Cup fixtures (scores blank until played). It is the Kaggle \"International football results\" dataset, read as a raw CSV from its GitHub mirror (no API key) and cached in data/raw/. It is what Elo is computed from and Dixon-Coles is fitted on."}}, {"name": "ESPN Scoreboard API", "url": "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard", "role": {"es": "Insumo — marcadores/resultados", "en": "Input — scores/results"}, "use": {"es": "Insumo de marcadores en vivo y resultados finales (no predice). El sitio lo consulta directo desde el navegador cada 60 s; en el servidor el pipeline lo usa para completar los finales que el histórico todavía no publicó, así la calibración no espera. Sin API key; cachea los días ya cerrados.", "en": "Input for live scores and final results (it doesn't predict). The site queries it directly from the browser every 60 s; server-side the pipeline uses it to fill finals not yet published in the history dataset, so calibration doesn't wait. No API key; closed days are cached."}}, {"name": "the-odds-api.com", "url": "https://the-odds-api.com", "optional": true, "role": {"es": "Benchmark — predice (mercado)", "en": "Benchmark — predicts (market)"}, "use": {"es": "Mercado de apuestas como benchmark de predicción: esta sí produce probabilidades comparables al modelo. Promedia las cuotas 1X2 entre casas y les quita el margen. Opcional: requiere ODDS_API_KEY; sin ella se omite. Su acierto se mide solo sobre partidos cuya cuota se capturó antes del inicio (no se puede backfillear el pasado en el plan gratuito).", "en": "Betting market as a prediction benchmark: this one d const pct = x => (x==null?"—":Math.round(x*100)+"%");
function fechaLinda(iso){const d=new Date(iso+"T12:00:00");
  return LANG==="es" ? `${t("days")[d.getDay()]} ${d.getDate()} de ${t("months")[d.getMonth()]}`
                     : `${t("days")[d.getDay()]} ${t("months")[d.getMonth()]} ${d.getDate()}`;}
function horaLocal(k){if(!k)return"";const d=new Date(k);return d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});}
function hoyLocal(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function fechaHoraLocal(iso){
  if(!iso) return DATA.generated||"";

// ---- marcadores en vivo (ESPN, client-side) ----
let LIVE = {};
async function fetchLive(){
  const now=new Date(), days=[];
  for(let i=1;i>=0;i--){const d=new Date(now);d.setUTCDate(d.getUTCDate()-i);
    days.push(`${d.getUTCFullYear()}${String(d.getUTCMonth()+1).padStart(2,"0")}${String(d.getUTCDate()).padStart(2,"0")}`);}
  const board={};
  for(const day of days){
    try{
      const r=await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${day}`);
      const j=await r.json();
      for(const ev of (j.events||[])){
        const comp=ev.competitions[0], st=comp.status.type;
        const sides={}; comp.competitors.forEach(c=>sides[c.homeAway]=c);
        if(!sides.home||!sides.away)continue;
        board[key(sides.home.team.displayName,sides.away.team.displayName)]={
          home:canon(sides.home.team.displayName),
          hs:+(sides.home.score||0), as:+(sides.away.score||0),
          state:st.state, detail:st.shortDetail||""};
      }
    }catch(e){/* CORS o sin red: se ignora, quedan los datos del build */}
  }
  LIVE=board;
}

// ---- tarjeta de partido ----
function liveFor(m){return LIVE[key(m.home,m.away)];}
function matchCard(m){
  const lv=liveFor(m); const reloj=horaLocal(m.kickoff_utc); const relojTxt=reloj?` · 🕐 ${reloj}`:"";
  let badge=`📍 ${m.city||""}`, result="";
  let hs,as_;
  if(lv){ if(lv.home===m.home){hs=lv.hs;as_=lv.as;} else {hs=lv.as;as_=lv.hs;} }
  if(lv && lv.state==="in"){
    badge=`<span class="chip live">🔴 ${t("live")} · ${lv.detail}</span>`;
    result=`<div class="result">${hs} – ${as_}<small>${t("inplay")}</small></div>`;
  }else if((lv&&lv.state==="post")||m.status==="jugado"){
    badge=`<span class="chip ok">✅ ${t("final")}</span>`;
    const r = lv ? `${hs} – ${as_}` : (m.result||"").replace("-"," – ");
    result=`<div class="result">${r}<small>${t("finalresult")}</small></div>`;
  }
  const chips=`<span class="chip hot">${m.score_1} · ${pct(m.p_score_1)}</span>`+
    `<span class="chip">${m.score_2} · ${pct(m.p_score_2)}</span>`+
    `<span class="chip">${m.score_3} · ${pct(m.p_score_3)}</span>`+
    `<span class="chip">${t("over25_chip")} · ${pct(m["p_over_2.5"])}</span>`+
    `<span class="chip">${t("btts_chip")} · ${pct(m.p_btts)}</span>`;
  return `<div class="mcard">
    <div class="mlabel"><span>${t("group")} ${m.group}${relojTxt}</span><span>${badge}</span></div>
    <div class="mteams"><span class="mteam">${flag(m.home)}</span><span class="mvs">${t("vs")}</span><span class="mteam">${flag(m.away)}</span></div>
    ${result}
    <div class="mxg">${t("xg")} <b>${m.xg_home.toFixed(2)} – ${m.xg_away.toFixed(2)}</b></div>
    <div class="mbar"><div style="background:${C.home};width:${m.p_home*100}%">${pct(m.p_home)}</div>
      <div style="background:${C.draw};width:${m.p_draw*100}%">${pct(m.p_draw)}</div>
      <div style="background:${C.away};width:${m.p_away*100}%">${pct(m.p_away)}</div></div>
    <div class="mlegend"><b>${teamName(m.home)}</b><span>${t("draw")}</span><b>${teamName(m.away)}</b></div>
    <div class="chips">${chips}</div>
    <details class="din"><summary>${t("seedetail")}</summary><div class="dbody">${matchDetail(m)}</div></details>
  </div>`;
}
function cmpRow(label,l,r,lshare,dec=0){
  const p=Math.max(2,Math.min(98,lshare*100));
  const f=v=>dec?v.toFixed(dec):Math.round(v);
  return `<div class="cmp"><span class="vl">${f(l)}</span><span class="mid"><small>${label}</small>
    <span class="cmpbar"><i style="width:${p}%;background:${C.home}"></i><i style="width:${100-p}%;background:${C.away}"></i></span></span>
    <span class="vr">${f(r)}</span></div>`;
}
function matchDetail(m){
  const eloShare=1/(1+Math.pow(10,(m.elo_away-m.elo_home)/400));
  const atk=m.attack_home/(m.attack_home+m.attack_away||1);
  const def=(1/m.defense_home)/((1/m.defense_home)+(1/m.defense_away)||1);
  const cmp=`<div class="dsec">${t("comparison")}</div>`+
    cmpRow("Elo",m.elo_home,m.elo_away,eloShare)+
    cmpRow(t("attack"),m.attack_home,m.attack_away,atk,2)+
    cmpRow(t("defense"),m.defense_home,m.defense_away,def,2)+
    cmpRow(t("xg_short"),m.xg_home,m.xg_away,m.xg_home/(m.xg_home+m.xg_away),2);
  const mkt=`<div class="dsec">${t("markets")}</div>`+
    `<div class="mkt"><span>${t("win")} ${teamName(m.home)}</span><b>${pct(m.p_home)}</b></div>`+
    `<div class="mkt"><span>${t("draw_cap")}</span><b>${pct(m.p_draw)}</b></div>`+
    `<div class="mkt"><span>${t("win")} ${teamName(m.away)}</span><b>${pct(m.p_away)}</b></div>`+
    `<div class="mkt"><span>${t("over25")}</span><b>${pct(m["p_over_2.5"])}</b></div>`+
    `<div class="mkt"><span>${t("under25")}</span><b>${pct(m["p_under_2.5"])}</b></div>`+
    `<div class="mkt"><span>${t("btts_cap")}</span><b>${pct(m.p_btts)}</b></div>`;
  const pmax=Math.max(m.p_score_1,m.p_score_2,m.p_score_3)||1;
  let rows="";[1,2,3].forEach(k=>{rows+=`<div class="slrow"><span class="sn">${m["score_"+k]}</span>
    <span class="sb"><i style="width:${m["p_score_"+k]/pmax*100}%"></i></span><span class="sp">${pct(m["p_score_"+k])}</span></div>`;});
  return cmp+mkt+`<div class="dsec">${t("likely")}</div><div class="slist">${rows}</div>`;
}

  p.querySelector("#fd").onchange=e=>{st.d=e.target.value;drawList();};

function drawList(){
  const st=window._f, box=document.getElementById("mlist"); if(!box)return;
  let v=DATA.matches.slice();
  if(st.g!=="all")v=v.filter(m=>m.group===st.g);
  if(st.d!=="all")v=v.filter(m=>m.date===st.d);
  if(st.s==="live")v=v.filter(m=>{const l=liveFor(m);return l&&l.state==="in";});
  else if(st.s==="played")v=v.filter(m=>{const l=liveFor(m);return (l&&l.state==="post")||m.status==="jugado";});
  else if(st.s==="pending")v=v.filter(m=>{const l=liveFor(m);return (!l||l.state==="pre")&&m.status!=="jugado";});
  v.sort((a,b)=>(a.date+a.kickoff_utc).localeCompare(b.date+b.kickoff_utc));
  if(!v.length){box.innerHTML=`<div class="info">${t("nofilter")}</div>`;return;}
  let h="";const byDay={};v.forEach(m=>{(byDay[m.date]=byDay[m.date]||[]).push(m);});
  Object.keys(byDay).sort().forEach(day=>{
    const arr=byDay[day];
    h+=`<div class="datehdr">📅 ${fechaLinda(day)} <small>${t("matches_n")(arr.length)}</small></div>`;
    h+=`<div class="grid">${arr.map(matchCard).join("")}</div>`;
  });
  box.innerHTML=h;
}

}

// ---- navegación ----
const renderers={partidos:renderPartidos,grupos:renderGrupos,eliminatorias:renderKO,titulo:renderTitulo,salud:renderSalud,info:renderInfo};
let current="partidos";
document.querySelectorAll("#nav button").forEach(b=>b.onclick=()=>{
  current=b.dataset.tab;
  document.querySelectorAll("#nav button").forEach(x=>x.classList.toggle("active",x===b));
  document.querySelectorAll(".panel").forEach(x=>x.classList.toggle("active",x.id==="panel-"+current));
  renderers[current]();
});

// ---- idioma ----
function renderAll(){renderPartidos();renderGrupos();renderKO();renderTitulo();renderSalud();renderInfo();}
function setLang(lang){
  LANG=lang; localStorage.setItem("mundial_lang",lang);
  applyChrome(); renderAll();
}
document.querySelectorAll("#langtog button").forEach(b=>b.onclick=()=>setLang(b.dataset.lang));

// ---- init ----
applyChrome();
renderAll();
fetchLive().then(()=>{if(current==="partidos")renderPartidos();});
setInterval(()=>fetchLive().then(()=>{if(current==="partidos")drawList();}),60000);
</script>
</body>
</html>
