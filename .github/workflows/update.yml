name: Actualizar predicciones

on:
  schedule:
    - cron: "0 6,15,23 * * *"   # UTC: cierre de la madrugada de partidos + jornada
  workflow_dispatch:            # botón manual en la pestaña Actions

permissions:
  contents: write

concurrency:
  group: update-predicciones
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Instalar dependencias
        run: uv venv && uv pip install -e .

      - name: Reentrenar y re-simular con datos frescos
        run: .venv/bin/python scripts/run_pipeline.py --fresh

      - name: Commit de datos actualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed data/predictions REPORT.md
          git diff --cached --quiet || git commit -m "datos: actualización automática [skip ci]"
          git push
