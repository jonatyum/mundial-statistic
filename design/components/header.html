<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<style>
  body{background:#0d1117;color:#e6edf3;font:14px/1.45 system-ui,-apple-system,sans-serif;margin:0}
  .strip{height:4px;background:linear-gradient(90deg,#006847 0 33%,#3c3b6e 33% 66%,#d80621 66% 100%)}
  header{display:flex;align-items:center;gap:24px;padding:14px 24px;background:#161b27;border-bottom:1px solid #2a3242}
  .logo{font-size:17px;font-weight:800;letter-spacing:-.01em}
  nav{display:flex;gap:4px;flex:1}
  nav a{color:#8b949e;text-decoration:none;font-size:13px;font-weight:600;padding:7px 14px;border-radius:8px}
  nav a.active{color:#e6edf3;background:#1e2433}
  nav a:hover{color:#e6edf3}
  .fresh{display:flex;align-items:center;gap:8px;font-size:12px;color:#8b949e}
  .dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e}
</style></head><body>
  <div class="strip"></div>
  <header>
    <span class="logo">⚽ Mundial 2026</span>
    <nav>
      <a class="active" href="#">Partidos</a><a href="#">Grupos</a><a href="#">Eliminatorias</a>
      <a href="#">Carrera al título</a><a href="#">Salud del modelo</a>
    </nav>
    <span class="fresh"><span class="dot"></span> Actualizado 07:00 UTC · modelo v0.2</span>
  </header>
</body></html>
