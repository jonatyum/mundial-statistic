<!-- @dsCard group="Components" name="Tabla de grupo" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<style>
  body{background:#0d1117;color:#e6edf3;font:14px/1.45 system-ui,-apple-system,sans-serif;margin:0;padding:24px}
  .card{width:520px;background:#161b27;border:1px solid #2a3242;border-radius:14px;padding:18px}
  h3{margin:0 0 2px;font-size:16px}
  .sub{font-size:12px;color:#8b949e;margin-bottom:12px}
  table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8b949e;text-align:right;padding:6px 8px;border-bottom:1px solid #2a3242}
  th:first-child{text-align:left}
  td{padding:8px;text-align:right;border-bottom:1px solid #1e2433;font-size:13px}
  td:first-child{text-align:left;font-weight:600}
  .adv{position:relative;background:#1e2433;border-radius:6px;height:18px;min-width:120px;overflow:hidden}
  .adv i{position:absolute;inset:0;background:linear-gradient(90deg,#22c55e,#16a34a);border-radius:6px}
  .adv b{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-style:normal;color:#0d1117;mix-blend-mode:plus-lighter;color:#e6edf3}
  .q1{color:#22c55e;font-weight:700}.q3{color:#eab308}
</style></head><body>
  <div class="card">
    <h3>Grupo A</h3>
    <div class="sub">México · Corea del Sur · Chequia · Sudáfrica — puntos esperados y vías de clasificación</div>
    <table>
      <tr><th>Equipo</th><th>Pts esp.</th><th>P(1º)</th><th>P(2º)</th><th>P(3º clasif.)</th><th>P(avanza)</th></tr>
      <tr><td>🇲🇽 México</td><td>6.11</td><td class="q1">58%</td><td>25%</td><td class="q3">10%</td>
          <td><div class="adv"><i style="width:93%"></i><b>93%</b></div></td></tr>
      <tr><td>🇰🇷 Corea del Sur</td><td>4.33</td><td class="q1">22%</td><td>33%</td><td class="q3">18%</td>
          <td><div class="adv"><i style="width:74%"></i><b>74%</b></div></td></tr>
      <tr><td>🇨🇿 Chequia</td><td>3.46</td><td class="q1">13%</td><td>25%</td><td class="q3">20%</td>
          <td><div class="adv"><i style="width:58%"></i><b>58%</b></div></td></tr>
      <tr><td>🇿🇦 Sudáfrica</td><td>2.57</td><td class="q1">6%</td><td>17%</td><td class="q3">17%</td>
          <td><div class="adv"><i style="width:40%"></i><b>40%</b></div></td></tr>
    </table>
  </div>
</body></html>
